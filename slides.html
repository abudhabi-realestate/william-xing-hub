<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>幻灯片 · William Xing</title>
  <meta name="description" content="William Xing 幻灯片在线浏览" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23050505' width='100' height='100' rx='16'/><circle cx='50' cy='50' r='28' fill='none' stroke='%23c9a227' stroke-width='3'/><text y='58' x='50' text-anchor='middle' font-size='36' fill='%23e8d5a3'>W</text></svg>" />
  <style>
    :root {
      --bg: #050505;
      --gold: #b8956a;
      --gold-light: #d4c4a8;
      --gold-bright: #e8d5a3;
      --text: #ece6dc;
      --muted: #8a8278;
      --border: rgba(184, 149, 106, 0.16);
      --serif: "Noto Serif SC", "Songti SC", Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      background: rgba(5, 5, 5, 0.92);
      border-bottom: 1px solid var(--border);
      padding: 0.55rem 1rem;
      backdrop-filter: blur(8px);
    }
    .bar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .bar a {
      color: var(--gold-light);
      text-decoration: none;
      font-family: var(--serif);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
    }
    .bar a:hover { color: var(--gold-bright); }
    .bar-title {
      font-family: var(--serif);
      font-size: 0.88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 50vw;
    }
    .bar-count {
      font-family: "SF Mono", Consolas, monospace;
      font-size: 0.72rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .stage-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3.25rem 0 3.5rem;
    }
    .stage {
      position: relative;
      width: min(96vw, calc((96vh - 6rem) * 16 / 9));
      aspect-ratio: 16 / 9;
      max-height: calc(100vh - 6.75rem);
      background: #0a0a0a;
      border: 1px solid var(--border);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
    }
    .stage img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }
    .nav-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 18%;
      cursor: pointer;
      z-index: 5;
    }
    .nav-zone.prev { left: 0; }
    .nav-zone.next { right: 0; }
    .controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: rgba(5, 5, 5, 0.92);
      border-top: 1px solid var(--border);
      padding: 0.65rem 1rem calc(0.65rem + env(safe-area-inset-bottom));
      backdrop-filter: blur(8px);
    }
    .controls-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(184, 149, 106, 0.08);
      color: var(--gold-light);
      font-size: 0.78rem;
      padding: 0.45rem 0.85rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: "SF Mono", Consolas, monospace;
    }
    .btn:hover { background: rgba(184, 149, 106, 0.16); color: var(--gold-bright); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .progress {
      flex: 1;
      height: 4px;
      background: rgba(184, 149, 106, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-bright));
      width: 0%;
      transition: width 0.2s ease;
    }
    .hint {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: "SF Mono", Consolas, monospace;
      white-space: nowrap;
    }
    .status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }
    .status a { color: var(--gold-light); }
    body.ready .status { display: none; }
    body.ready .stage-wrap,
    body.ready .controls { display: block; }
    .stage-wrap, .controls { display: none; }
    @media (max-width: 640px) {
      .hint { display: none; }
      .bar-title { max-width: 42vw; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <header class="bar">
    <div class="bar-inner">
      <a href="./">← WilliamXing</a>
      <span class="bar-title" id="title">加载中…</span>
      <span class="bar-count" id="counter">—</span>
    </div>
  </header>

  <div class="status" id="status">正在加载幻灯片…</div>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <img id="slide" alt="" />
      <div class="nav-zone prev" id="tapPrev" aria-hidden="true"></div>
      <div class="nav-zone next" id="tapNext" aria-hidden="true"></div>
    </div>
  </div>

  <footer class="controls">
    <div class="controls-inner">
      <button type="button" class="btn" id="btnPrev">← 上一页</button>
      <div class="progress" aria-hidden="true"><span id="progress"></span></div>
      <button type="button" class="btn" id="btnNext">下一页 →</button>
      <button type="button" class="btn" id="btnFs">全屏</button>
      <span class="hint">← → · 空格 · F</span>
    </div>
  </footer>

  <script>
    (function () {
      var deck = new URLSearchParams(location.search).get('deck');
      var statusEl = document.getElementById('status');
      var titleEl = document.getElementById('title');
      var counterEl = document.getElementById('counter');
      var slideEl = document.getElementById('slide');
      var progressEl = document.getElementById('progress');
      var btnPrev = document.getElementById('btnPrev');
      var btnNext = document.getElementById('btnNext');
      var btnFs = document.getElementById('btnFs');
      var index = 0;
      var meta = null;
      var base = '';

      function fail(msg) {
        statusEl.innerHTML = msg;
      }

      if (!deck || !/^[a-z0-9-]+$/.test(deck)) {
        fail('请在 URL 中指定 deck 参数，例如 <a href="slides.html?deck=why-abu-dhabi">slides.html?deck=why-abu-dhabi</a>');
        return;
      }

      base = './slides/' + deck + '/';

      fetch(base + 'meta.json')
        .then(function (r) {
          if (!r.ok) throw new Error('not found');
          return r.json();
        })
        .then(function (data) {
          if (!data.slides || !data.slides.length) throw new Error('empty');
          meta = data;
          document.title = (data.title || deck) + ' · William Xing';
          titleEl.textContent = data.title || deck;
          document.body.classList.add('ready');
          show(0);
          preload();
        })
        .catch(function () {
          fail('找不到幻灯片 <strong>' + deck + '</strong>。<br>请先把 .pptx 放入 <code>slides/source/</code>，再运行构建脚本。');
        });

      function show(i) {
        index = Math.max(0, Math.min(i, meta.slides.length - 1));
        slideEl.src = base + meta.slides[index];
        slideEl.alt = (meta.title || deck) + ' · 第 ' + (index + 1) + ' 页';
        counterEl.textContent = (index + 1) + ' / ' + meta.slides.length;
        progressEl.style.width = (((index + 1) / meta.slides.length) * 100) + '%';
        btnPrev.disabled = index === 0;
        btnNext.disabled = index === meta.slides.length - 1;
      }

      function preload() {
        [index + 1, index - 1].forEach(function (j) {
          if (j < 0 || j >= meta.slides.length) return;
          var img = new Image();
          img.src = base + meta.slides[j];
        });
      }

      function step(delta) {
        if (!meta) return;
        show(index + delta);
        preload();
      }

      btnPrev.addEventListener('click', function () { step(-1); });
      btnNext.addEventListener('click', function () { step(1); });
      document.getElementById('tapPrev').addEventListener('click', function () { step(-1); });
      document.getElementById('tapNext').addEventListener('click', function () { step(1); });

      btnFs.addEventListener('click', function () {
        var el = document.documentElement;
        if (!document.fullscreenElement) el.requestFullscreen && el.requestFullscreen();
        else document.exitFullscreen && document.exitFullscreen();
      });

      document.addEventListener('keydown', function (e) {
        if (!meta) return;
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
          e.preventDefault();
          step(1);
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
          e.preventDefault();
          step(-1);
        } else if (e.key === 'Home') {
          e.preventDefault();
          show(0);
        } else if (e.key === 'End') {
          e.preventDefault();
          show(meta.slides.length - 1);
        } else if (e.key === 'f' || e.key === 'F') {
          btnFs.click();
        }
      });

      var touchX = 0;
      document.addEventListener('touchstart', function (e) {
        touchX = e.changedTouches[0].clientX;
      }, { passive: true });
      document.addEventListener('touchend', function (e) {
        if (!meta) return;
        var dx = e.changedTouches[0].clientX - touchX;
        if (Math.abs(dx) < 40) return;
        step(dx < 0 ? 1 : -1);
      }, { passive: true });
    })();
  </script>
</body>
</html>
